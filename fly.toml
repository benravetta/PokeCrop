# fly.toml app configuration file generated for pokecrop on 2026-06-19T07:54:39Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'pokecrop'
primary_region = 'lhr'

[build]
  dockerfile = 'Dockerfile.fly'

  # Public Supabase config baked into the SPA at build time. The publishable key
  # is safe to expose to the browser (RLS protects the data), so it lives here
  # rather than in secrets — this lets the GitHub auto-deploy build correctly.
  [build.args]
    VITE_SUPABASE_URL = 'https://wymzhmbjlfaoahlhzhgd.supabase.co'
    VITE_SUPABASE_PUBLISHABLE_KEY = 'sb_publishable_vBGh2FSPsMRgB0YSZpyWeQ_thadWbd0'

[env]
  PUBLIC_ORIGIN = "https://gemcheck.co.uk"
  CORS_ORIGIN = "https://gemcheck.co.uk"
  PYTHON_TIMEOUT_MS = '180000'
  UVICORN_WORKERS = '1'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  # Keep one machine always warm so there are no cold-start delays on the first
  # request after idle (in-memory sessions also stay coherent on a single machine).
  min_machines_running = 1

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 25
    soft_limit = 20

[[vm]]
  # Card extraction is CPU-bound (OpenCV); 2x shared CPUs roughly halve compute time.
  size = 'shared-cpu-2x'
  # 2GB headroom: a high-res crop peaks around ~1.2GB on its own, and the learned
  # segmentation model (onnxruntime) adds ~100MB resident on top of that.
  memory = '2gb'
