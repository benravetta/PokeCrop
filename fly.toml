# fly.toml app configuration file generated for pokecrop on 2026-06-19T07:54:39Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'pokecrop'
primary_region = 'lhr'

[build]
  dockerfile = 'Dockerfile.fly'

[env]
  PYTHON_TIMEOUT_MS = '180000'
  UVICORN_WORKERS = '1'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  # Keep one machine always warm so there are no cold-start delays on the first
  # request after idle (in-memory sessions also stay coherent on a single machine).
  min_machines_running = 1

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 25
    soft_limit = 20

[[vm]]
  # Card extraction is CPU-bound (OpenCV); 2x shared CPUs roughly halve compute time.
  size = 'shared-cpu-2x'
  memory = '1gb'
