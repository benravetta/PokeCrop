# Fly.io config for PokeCrop (single-container, all services).
# `fly launch` will set/replace `app` with your chosen name on first deploy.

app = "pokecrop"
primary_region = "lhr"

[build]
  dockerfile = "Dockerfile.fly"

[env]
  UVICORN_WORKERS = "1"
  PYTHON_TIMEOUT_MS = "180000"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    soft_limit = 20
    hard_limit = 25

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
