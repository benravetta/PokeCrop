# fly.toml app configuration file generated for pokecrop on 2026-06-19T07:54:39Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'pokecrop'
primary_region = 'lhr'

[build]
  dockerfile = 'Dockerfile.fly'

[env]
  PYTHON_TIMEOUT_MS = '180000'
  UVICORN_WORKERS = '1'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 25
    soft_limit = 20

[[vm]]
  size = 'shared-cpu-1x'
  memory = '1gb'
