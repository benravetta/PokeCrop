# PokeCrop production stack.
#
#   docker compose up -d --build
#
# Only the frontend (nginx) is published. It serves the SPA and reverse-proxies
# /api to the Node backend, which in turn talks to the Python service over the
# internal network. Configure host port / public origin in a .env file
# (see .env.example).

services:
  python:
    build: ./python-service
    environment:
      CORS_ORIGIN: ${PUBLIC_ORIGIN:-http://localhost:8080}
      UVICORN_WORKERS: ${UVICORN_WORKERS:-1}
    expose:
      - "5001"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:5001/health',timeout=3).status==200 else 1)"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      PORT: "3001"
      PYTHON_URL: http://python:5001
      PYTHON_TIMEOUT_MS: ${PYTHON_TIMEOUT_MS:-180000}
      CORS_ORIGIN: ${PUBLIC_ORIGIN:-http://localhost:8080}
    expose:
      - "3001"
    depends_on:
      python:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "require('http').get('http://127.0.0.1:3001/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "${PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
